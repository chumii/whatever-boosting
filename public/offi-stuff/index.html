<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Whatever — Offizeug</title>
    <link rel="stylesheet" href="src/css/style.css" />
  </head>
  <body>
    <nav class="topnav">
      <a class="topnav-brand" href="/">Whatever</a>
      <div class="topnav-links">
        <a class="topnav-link" href="/boosting/">Boosting</a>
        <a class="topnav-link" href="/royale/">Whatever Royale</a>
        <a class="topnav-link active" href="/offi-stuff/">Offizeug</a>
      </div>
    </nav>

    <div id="gate">
      <div class="gate-box">
        <div class="gate-label">Passwort</div>
        <div class="gate-row">
          <input class="gate-input" id="pw-input" type="password" autocomplete="current-password" />
          <button class="gate-btn" id="pw-btn">OK</button>
        </div>
        <div class="gate-error" id="pw-error"></div>
      </div>
    </div>

    <div id="content" style="display:none">
      <aside class="sidebar">
        <a class="sidebar-link" href="/offi-stuff/kalender/">Kalender</a>
        <a class="sidebar-link active" href="/offi-stuff/member/">Member</a>
        <div class="sidebar-divider"></div>
        <a class="sidebar-link" href="/wcl/">WCL Analyse</a>
        <a class="sidebar-link" href="/wcl/templates/">Query Templates</a>
        <a class="sidebar-link" href="/wcl/spells/">Spell Filter</a>
      </aside>
      <main>
        <div class="card">
          <div class="card-header">
            <h2>Mitglieder</h2>
            <button class="btn btn-primary btn-with-icon" id="new-member-btn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
              <span>Mitglied</span>
            </button>
          </div>
          <table class="data-table" id="members-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Discord</th>
                <th class="actions"></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>

    <dialog id="member-dialog" class="dialog">
      <form method="dialog" data-form="member">
        <h2 data-title>Mitglied hinzufügen</h2>
        <label>Name<input name="name" required /></label>
        <label>Discord<input name="discord_name" placeholder="optional" /></label>
        <div class="dialog-actions">
          <button type="button" data-close>Abbrechen</button>
          <button type="submit" class="btn btn-primary">Speichern</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>

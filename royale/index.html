<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Whatever — Whatever Royale</title>
    <link rel="stylesheet" href="src/css/style.css" />
  </head>
  <body>
    <nav class="topnav">
      <a class="topnav-brand" href="/">Whatever</a>
      <div class="topnav-links">
        <a class="topnav-link" href="/boosting/">Boosting</a>
        <a class="topnav-link" href="/offi-stuff/">Offizeug</a>
        <a class="topnav-link active" href="/royale/">Whatever Royale</a>
      </div>
    </nav>

    <div class="addon-bar">
      <span class="addon-bar-title">Addons</span>

      <a class="addon-download" href="WhateverRoyaleClient-v1.0.1.zip" download>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>WhateverRoyale Client</span>
      </a>
      <span class="addon-version">v1.0.1</span>

      <a class="addon-download" id="wr-download-btn" href="WhateverRoyale-v2.0.2.zip" download>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>WhateverRoyale</span>
      </a>
      <span class="addon-version">v2.0.2</span>
    </div>

    <main>
      <div id="summary-grid" class="stat-grid">
        <div class="stat-cell">
          <div class="stat-label">Sessions</div>
          <div class="stat-value mono" id="stat-sessions">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Runden</div>
          <div class="stat-value mono" id="stat-rounds">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Gold-Volumen</div>
          <div class="stat-value gold" id="stat-volume">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Größte Auszahlung</div>
          <div class="stat-value gold" id="stat-biggest">—</div>
        </div>
      </div>

      <div class="lower-section">

      <div class="card card-leaderboard">
        <div class="card-header">
          <h2 id="leaderboard-heading">Rangliste</h2>
          <button class="btn btn-primary" id="refresh-btn">Aktualisieren</button>
        </div>
        <table class="data-table" id="leaderboard-table">
          <thead>
            <tr>
              <th class="rank">#</th>
              <th>Spieler</th>
              <th class="num">Netto-Gold</th>
              <th class="num">Gewonnen</th>
              <th class="num">Verloren</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card card-sessions" id="sessions-card">
        <div class="card-header sessions-header">
          <div class="sessions-header-left">
            <h2 id="sessions-heading">Sessions</h2>
            <div class="filter-chips" id="sessions-filter">
              <button class="chip active" data-filter="all" type="button">Alle</button>
              <button class="chip" data-filter="simpleDice" type="button">Simple Dice</button>
              <button class="chip" data-filter="deathRoll" type="button">Death Roll</button>
            </div>
          </div>
          <div class="sessions-header-right">
            <div class="pager">
              <button class="btn pager-btn" id="pager-prev" type="button" aria-label="Vorherige Seite">‹</button>
              <span class="pager-info" id="pager-info">— / —</span>
              <button class="btn pager-btn" id="pager-next" type="button" aria-label="Nächste Seite">›</button>
            </div>
            <a class="btn btn-primary" href="/royale/import/">Import</a>
          </div>
        </div>
        <div class="session-grid" id="sessions-grid"></div>
        <div class="empty hidden" id="sessions-empty">Keine Sessions für diesen Filter.</div>
      </div>

      </div><!-- /.lower-section -->
    </main>

    <dialog id="session-dialog" class="session-dialog"></dialog>

    <dialog id="wr-pw-dialog" class="wr-pw-dialog">
      <div class="gate-label" style="margin-bottom:8px">WhateverRoyale — Passwort</div>
      <div class="gate-row">
        <input class="gate-input" id="wr-pw-input" type="password" autocomplete="current-password" />
        <button class="gate-btn" id="wr-pw-ok">OK</button>
      </div>
      <div class="gate-error" id="wr-pw-error"></div>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>

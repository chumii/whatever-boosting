<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Whatever Guild</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #0a0a0a; color: #fff;
        font: 13px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, Roboto, sans-serif;
      }
      a { color: inherit; text-decoration: none; }
      body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
      .landing { width: 100%; max-width: 480px; padding: 0 24px; }
      .landing-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 24px; }
      .modules { display: flex; flex-direction: column; gap: 10px; }
      .module-card {
        display: flex; align-items: center; gap: 14px;
        padding: 14px 16px;
        background: #111; border: 1px solid #222; border-radius: 4px;
        cursor: pointer; transition: border-color 0.1s;
      }
      .module-card:hover { border-color: #3f3f3f; }
      .module-icon {
        width: 34px; height: 34px; border-radius: 4px;
        background: #1a1a1a; border: 1px solid #2e2e2e;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      .module-icon svg { stroke: #888; }
      .module-name { font-weight: 500; font-size: 13px; }
      .module-arrow { margin-left: auto; color: #555; }
    </style>
  </head>
  <body>
    <div class="landing">
      <h1 class="landing-title">Whatever</h1>
      <div class="modules">
        <a class="module-card" href="/boosting/">
          <div class="module-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          </div>
          <div>
            <div class="module-name">Boosting</div>
          </div>
          <svg class="module-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>
        <a class="module-card" href="/royale/">
          <div class="module-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.519l4.276 3.664a1 1 0 0 0 1.516-.294z"/>
              <path d="M5 21h14"/>
            </svg>
          </div>
          <div>
            <div class="module-name">Whatever Royale</div>
          </div>
          <svg class="module-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>
        <a class="module-card" href="/offi-stuff/">
          <div class="module-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div>
            <div class="module-name">Offizeug</div>
          </div>
          <svg class="module-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>
    </div>
  </body>
</html>

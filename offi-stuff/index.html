<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Whatever — Offizeug</title>
    <link rel="stylesheet" href="src/css/style.css" />
  </head>
  <body>
    <nav class="topnav">
      <a class="topnav-brand" href="/">Whatever</a>
      <div class="topnav-links">
        <a class="topnav-link" href="/boosting/">Boosting</a>
        <a class="topnav-link active" href="/offi-stuff/">Offizeug</a>
      </div>
    </nav>

    <div id="gate">
      <div class="gate-box">
        <div class="gate-label">Passwort</div>
        <div class="gate-row">
          <input class="gate-input" id="pw-input" type="password" autocomplete="current-password" />
          <button class="gate-btn" id="pw-btn">OK</button>
        </div>
        <div class="gate-error" id="pw-error"></div>
      </div>
    </div>

    <div id="content" style="display:none">
      <aside class="sidebar">
        <a class="sidebar-link active" href="/offi-stuff/">Übersicht</a>
        <a class="sidebar-link" href="/offi-stuff/urlaubskalender/">Urlaubskalender</a>
      </aside>
      <main>
        <p class="muted">Wähle einen Bereich aus der Seitenleiste.</p>
      </main>
    </div>

    <script type="module">
      import { installGate } from './src/js/gate.js';
      import { PASSWORD } from './src/js/config.js';
      installGate({ password: PASSWORD });
    </script>
  </body>
</html>
